<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 개인 AI 에이전트</title>
    <style>
body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 90vh; /* 화면을 조금 더 길게 썼습니다 */
            overflow: hidden;
        }
        .chat-header {
            background: #2c3e50;
            color: #ffffff;
            padding: 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .chat-box {
            flex: 1;
            padding: 20px;
            padding-bottom: 40px; /* ⭐ 입력창과 마지막 메시지 사이에 여유 공간 추가 */
            overflow-y: auto;     /* ⭐ 전체 스크롤 활성화 */
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 90%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
            flex-shrink: 0; /* ⭐ 핵심! 메시지가 찌그러지면서 내부 스크롤이 생기는 현상 방지 */
        }
        .user-message {
            align-self: flex-end;
            background: #3498db;
            color: white;
            border-bottom-right-radius: 2px;
        }
        .ai-message {
            align-self: flex-start;
            background: #ecf0f1;
            color: #333;
            border-bottom-left-radius: 2px;
            overflow-x: auto; 
        }
        .input-area {
            display: flex;
            padding: 15px;
            background: #fafafa;
            border-top: 1px solid #eee;
        }
        #promptInput {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }
        #sendBtn {
            background: #3498db;
            color: white;
            border: none;
            padding: 0 20px;
            margin-left: 10px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }
        
        /* 로딩 및 테이블 CSS */
        .typing-indicator {
            display: flex; gap: 5px; padding: 16px; background: #ecf0f1;
            border-radius: 12px; border-bottom-left-radius: 2px;
            align-self: flex-start; width: fit-content;
            flex-shrink: 0; /* 로딩바도 찌그러지지 않게 */
        }
        .typing-indicator span {
            width: 8px; height: 8px; background-color: #95a5a6;
            border-radius: 50%; animation: typing 1.4s infinite both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1.2); }
        }

        /* 표 스타일 */
        .result-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
            font-size: 0.9em;
            background-color: #fff;
            white-space: nowrap; 
        }
        .result-table th, .result-table td {
            border: 1px solid #bdc3c7;
            padding: 8px 12px;
            text-align: left;
        }
        .result-table th {
            background-color: #34495e;
            color: white;
        }
        .result-table tr:nth-child(even) { background-color: #f9f9f9; }
        
        /* ⭐ 예/아니오 버튼 스타일 */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            padding-left: 16px;
        }
        .btn-confirm {
            background: #2ecc71; color: white; border: none;
            padding: 8px 16px; border-radius: 6px; cursor: pointer;
            font-weight: bold; transition: background 0.2s;
        }
        .btn-confirm:hover { background: #27ae60; }
        
        .btn-cancel {
            background: #e74c3c; color: white; border: none;
            padding: 8px 16px; border-radius: 6px; cursor: pointer;
            font-weight: bold; transition: background 0.2s;
        }
        .btn-cancel:hover { background: #c0392b; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">AI 에이전트 tool calling sample</div>
    <div class="chat-box" id="chatBox">
        <div class="message ai-message">안녕하세요! 무엇을 도와드릴까요? (예: 회원 목록 조회해줘)</div>
    </div>
    <div class="input-area">
        <input type="text" id="promptInput" placeholder="질문을 입력하세요..." onkeypress="handleKeyPress(event)">
        <button id="sendBtn" onclick="askAgent()">전송</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const promptInput = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');
    let loadingElement = null;

    function handleKeyPress(event) {
        if (event.key === 'Enter') askAgent();
    }

    // ⭐ 텍스트를 분석해서 JSON 배열이면 HTML 표로 만들어주는 함수
    function formatMessage(text) {
        try {
            const data = JSON.parse(text);
            // 파싱된 데이터가 배열이고 안에 내용이 있을 때
            if (Array.isArray(data) && data.length > 0) {
                let table = '<table class="result-table"><thead><tr>';
                
                // 첫 번째 줄의 키(Key)값들을 뽑아서 헤더(th)로 만듦
                const keys = Object.keys(data[0]);
                keys.forEach(key => { table += `<th>${key}</th>`; });
                table += '</tr></thead><tbody>';
                
                // 데이터(행) 채우기
                data.forEach(row => {
                    table += '<tr>';
                    keys.forEach(key => {
                        const val = row[key] !== null ? row[key] : '';
                        table += `<td>${val}</td>`;
                    });
                    table += '</tr>';
                });
                table += '</tbody></table>';
                return table;
            } else if (Array.isArray(data) && data.length === 0) {
                return "조회된 데이터가 없습니다.";
            }
        } catch (e) {
            // JSON이 아닌 일반 텍스트(대화)면 줄바꿈만 처리해서 리턴
            return text.replace(/\n/g, '<br>');
        }
        return text;
    }

    function appendMessage(sender, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message ' + (sender === 'user' ? 'user-message' : 'ai-message');
        
        // AI 메시지일 경우에만 표 변환 시도
        if (sender === 'ai') {
            msgDiv.innerHTML = formatMessage(text);
        } else {
            msgDiv.textContent = text;
        }
        
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showLoading() {
        loadingElement = document.createElement('div');
        loadingElement.className = 'typing-indicator';
        loadingElement.innerHTML = '<span></span><span></span><span></span>';
        chatBox.appendChild(loadingElement);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function hideLoading() {
        if (loadingElement) {
            chatBox.removeChild(loadingElement);
            loadingElement = null;
        }
    }

    async function askAgent() {
        const prompt = promptInput.value.trim();
        if (!prompt) return;

        appendMessage('user', prompt);
        promptInput.value = '';
        promptInput.disabled = true; sendBtn.disabled = true;
        showLoading();

        try {
            const response = await fetch(`/ask?prompt=${encodeURIComponent(prompt)}`);
            const data = await response.text(); 
            hideLoading();
            
            // ⭐ 백엔드에서 버튼 요청 신호가 왔는지 확인
            if (data.startsWith("[CONFIRM_REQUEST]")) {
                // 특수 신호 글자 지우고 출력
                const cleanData = data.replace("[CONFIRM_REQUEST]", "");
                appendMessage('ai', cleanData);
                
                // 버튼 영역 렌더링
                const btnDiv = document.createElement('div');
                btnDiv.className = 'action-buttons';
                btnDiv.innerHTML = `
                    <button class="btn-confirm" onclick="sendSystemCommand('[SYS_YES]', '✅ 예 (실행)', this)">✅ 예 (실행)</button>
                    <button class="btn-cancel" onclick="sendSystemCommand('[SYS_NO]', '❌ 아니오 (취소)', this)">❌ 아니오 (취소)</button>
                `;
                chatBox.appendChild(btnDiv);
                chatBox.scrollTop = chatBox.scrollHeight;
                
            } else {
                appendMessage('ai', data);
            }
            
        } catch (error) {
            hideLoading();
            appendMessage('ai', '❌ 통신 중 오류가 발생했습니다: ' + error.message);
        } finally {
            promptInput.disabled = false; sendBtn.disabled = false;
            promptInput.focus();
        }
    }

    // ⭐ 버튼 클릭 시 호출되는 함수 (시스템 명령어를 조용히 백엔드로 보냄)
    async function sendSystemCommand(command, displayText, buttonElement) {
        // 클릭된 버튼 영역 삭제 (중복 클릭 방지)
        buttonElement.parentElement.remove();
        
        // 사용자가 선택한 결과를 화면에 표시
        appendMessage('user', displayText);
        
        promptInput.disabled = true; sendBtn.disabled = true;
        showLoading();

        try {
            const response = await fetch(`/ask?prompt=${encodeURIComponent(command)}`);
            const data = await response.text();
            hideLoading();
            appendMessage('ai', data);
        } catch (error) {
            hideLoading();
            appendMessage('ai', '❌ 통신 중 오류가 발생했습니다: ' + error.message);
        } finally {
            promptInput.disabled = false; sendBtn.disabled = false;
            promptInput.focus();
        }
    }
</script>

</body>
</html>

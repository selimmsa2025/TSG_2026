<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>RAG 챗봇</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; display: flex; height: 100vh; background: #f0f2f5; }

        /* ── 왼쪽 사이드 로그 패널 ── */
        #side-panel {
            width: 380px; min-width: 380px;
            background: #1e1e2e;
            color: #cdd6f4;
            display: flex; flex-direction: column;
            border-right: 2px solid #313244;
        }
        #side-panel h2 {
            padding: 16px;
            font-size: 14px;
            color: #89b4fa;
            border-bottom: 1px solid #313244;
            letter-spacing: 1px;
        }
        #log-box {
            flex: 1; overflow-y: auto;
            padding: 12px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }
        .log-section { margin-bottom: 16px; }
        .log-title {
            color: #a6e3a1; font-weight: bold;
            margin-bottom: 6px; font-size: 11px;
            letter-spacing: 0.5px;
        }
        .log-question {
            background: #313244; border-radius: 6px;
            padding: 8px; margin-bottom: 6px;
        }
        .log-question .label { color: #89b4fa; font-size: 10px; margin-bottom: 2px; }
        .log-question .vector { color: #f38ba8; font-size: 10px; margin-top: 4px; word-break: break-all; }

        .log-match {
            background: #25253a; border-radius: 6px;
            padding: 8px; margin-bottom: 6px;
            border-left: 3px solid #89b4fa;
        }
        .log-match.rank-1 { border-left-color: #a6e3a1; }
        .log-match.rank-2 { border-left-color: #89b4fa; }
        .log-match.rank-3 { border-left-color: #cba6f7; }

        .log-match .rank-score {
            display: flex; justify-content: space-between;
            margin-bottom: 4px;
        }
        .log-match .rank-label { color: #cba6f7; font-weight: bold; font-size: 11px; }
        .log-match .score { color: #a6e3a1; font-size: 11px; }
        .log-match .chunk-text { color: #cdd6f4; font-size: 11px; line-height: 1.4; margin-bottom: 4px; }
        .log-match .vector { color: #f38ba8; font-size: 10px; word-break: break-all; }
        .log-empty { color: #6c7086; font-size: 11px; padding: 8px; }
        
        .log-match .source {
		    color: #fab387;
		    font-size: 10px;
		    margin: 4px 0;
		}

        #log-placeholder {
            color: #6c7086; font-size: 12px;
            text-align: center; padding: 30px 16px;
            line-height: 1.8;
        }

        /* ── 오른쪽 채팅 영역 ── */
        #chat-area {
            flex: 1; display: flex; flex-direction: column;
            padding: 24px;
        }
        h1 {
            text-align: center; color: #333;
            margin-bottom: 16px; font-size: 22px;
        }
        #chat-box {
            flex: 1; border: 1px solid #ddd; border-radius: 12px;
            overflow-y: auto; padding: 16px;
            background: white; margin-bottom: 16px;
        }
        .message { margin: 10px 0; padding: 10px 14px; border-radius: 10px; max-width: 80%; }
        .user { background: #007bff; color: white; margin-left: auto; }
        .ai   { background: #f1f3f5; color: #333; }
        .label { font-size: 11px; font-weight: bold; margin-bottom: 4px; opacity: 0.7; }

        #input-area { display: flex; gap: 10px; }
        #message-input {
            flex: 1; padding: 12px; border: 1px solid #ddd;
            border-radius: 8px; font-size: 15px;
        }
        #send-btn {
            padding: 12px 24px; background: #007bff; color: white;
            border: none; border-radius: 8px; cursor: pointer; font-size: 15px;
        }
        #send-btn:hover { background: #0056b3; }
        #send-btn:disabled { background: #aaa; cursor: not-allowed; }
    </style>
</head>
<body>

    <!-- 왼쪽 로그 사이드 패널 -->
    <div id="side-panel">
        <h2>🔍 RETRIEVER 로그</h2>
        <div id="log-box">
            <div id="log-placeholder">
                질문을 입력하면<br>
                벡터 검색 과정이<br>
                여기에 표시됩니다.
            </div>
        </div>
    </div>

    <!-- 오른쪽 채팅 영역 -->
    <div id="chat-area">
        <h1>🤖 RAG 챗봇</h1>
        <div id="chat-box"></div>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="질문을 입력하세요..." />
            <button id="send-btn" onclick="sendMessage()">전송</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('message-input');
        const btn = document.getElementById('send-btn');
        const logBox = document.getElementById('log-box');

        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = 'message ' + sender;
            div.innerHTML = '<div class="label">' + (sender === 'user' ? '나' : 'AI') + '</div>' + text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        // 사이드 패널 로그 업데이트
        function updateLog(logs) {
            logBox.innerHTML = '';

            const section = document.createElement('div');
            section.className = 'log-section';

            logs.forEach(log => {
                if (log.type === 'question') {
                    const title = document.createElement('div');
                    title.className = 'log-title';
                    title.textContent = '▶ 질문 벡터화';
                    section.appendChild(title);

                    const div = document.createElement('div');
                    div.className = 'log-question';
                    div.innerHTML = `
                        <div class="label">질문</div>
                        <div>${log.text}</div>
                        <div class="label" style="margin-top:6px">벡터 (${log.dimension}차원)</div>
                        <div class="vector">${log.vector}</div>
                    `;
                    section.appendChild(div);

                    const title2 = document.createElement('div');
                    title2.className = 'log-title';
                    title2.style.marginTop = '12px';
                    title2.textContent = '▶ 코사인 유사도 검색 결과';
                    section.appendChild(title2);

                } else if (log.type === 'match') {
                    const div = document.createElement('div');
                    div.className = `log-match rank-${log.rank}`;
                    div.innerHTML = `
                        <div class="rank-score">
                            <span class="rank-label">${log.rank}위</span>
                            <span class="score">유사도: ${log.score}</span>
                        </div>
                        <div class="chunk-text">${log.text}</div>
                        <div class="source">📄 ${log.source}</div>
                        <div class="vector">${log.vector}</div>
                    `;
                    section.appendChild(div);
                } else if (log.type === 'empty') {
                    const div = document.createElement('div');
                    div.className = 'log-empty';
                    div.textContent = log.text;
                    section.appendChild(div);
                }
            });

            logBox.appendChild(section);
        }

        async function sendMessage() {
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            input.value = '';
            btn.disabled = true;
            btn.textContent = '답변 중...';

            // 사이드 로그 먼저 업데이트
            try {
                const logRes = await fetch('/api/search-log', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const logs = await logRes.json();
                updateLog(logs);
            } catch (e) {
                console.error('로그 오류:', e);
            }

            // 스트리밍 응답
            const aiDiv = addMessage('', 'ai');
            let fullText = '';
            let buffer = '';

            try {
                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            const token = line.slice(5).replace(/\\n/g, '\n');
                            fullText += token;
                            aiDiv.innerHTML = '<div class="label">AI</div>'
                                + fullText.replace(/\n/g, '<br>');
                            chatBox.scrollTop = chatBox.scrollHeight;
                        }
                    }
                }
            } catch (e) {
                aiDiv.innerHTML = '<div class="label">AI</div>오류가 발생했습니다.';
            } finally {
                btn.disabled = false;
                btn.textContent = '전송';
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spring AI Agent</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <link href="/css/springai.css" rel="stylesheet" />
  <script src="/js/springai.js"></script>

  <script>
    // ##### 벡터 저장소 데이터를 모두 삭제 #####
    async function handleClear() {
      try {
        springai.setSpinner("spinner", true);

        const response = await fetch('/ai/rag-clear', {
          method: "get"
        });

        const uuid = springai.addAnswerPlaceHolder("chatPanel");
        springai.printAnswerText(response.body, uuid, "chatPanel");

      } catch (error) {
        console.log(error);
      } finally {
        springai.setSpinner("spinner", false);
      }
    }

    // ##### 문서 업로드 후 ETL 실행 #####
    async function handleETL() {
      try {
        springai.setSpinner("spinner", true);

        const attach = document.getElementById("attach").files[0];
        if (!attach) {
          alert("문서 파일을 선택해야 합니다.");
          return;
        }

        const source = document.getElementById("source").value;
        if (!source) {
          alert("출처를 입력해야 합니다.");
          return;
        }

        const chunkSize = document.getElementById("chunkSize").value;
        if (!chunkSize) {
          alert("chunkSize를 입력해야 합니다.");
          return;
        }

        const minChunkSizeChars = document.getElementById("minChunkSizeChars").value;
        if (!minChunkSizeChars) {
          alert("minChunkSizeChars를 입력해야 합니다.");
          return;
        }

        const formData = new FormData();
        formData.append("attach", attach);
        formData.append("source", source);
        formData.append("chunkSize", chunkSize);
        formData.append("minChunkSizeChars", minChunkSizeChars);

        const response = await fetch('/ai/rag-etl', {
          method: "post",
          body: formData
        });

        const uuid = springai.addAnswerPlaceHolder("chatPanel");
        springai.printAnswerText(response.body, uuid, "chatPanel");

      } catch (error) {
        console.log(error);
      } finally {
        springai.setSpinner("spinner", false);
      }
    }

    // ##### Agent 질문 실행 #####
    async function handleAgentQuestion() {
      try {
        springai.setSpinner("spinner", true);

        const question = document.getElementById("question").value;
        if (!question) {
          alert("질문을 입력해야 합니다.");
          return;
        }

        springai.addUserQuestion(question, "chatPanel");

        const score = document.getElementById("score").value;
        const questionSource = document.getElementById("questionSource").value;

        const url = `/agent/chat?message=${encodeURIComponent(question)}&source=${encodeURIComponent(questionSource)}&score=${encodeURIComponent(score)}`;

        const response = await fetch(url, {
          method: "get",
          headers: {
            'Accept': 'text/plain'
          }
        });

        const uuid = springai.addAnswerPlaceHolder("chatPanel");
        springai.printAnswerText(response.body, uuid, "chatPanel");

      } catch (error) {
        console.log(error);
      } finally {
        springai.setSpinner("spinner", false);
      }
    }
  </script>
</head>

<body>
  <div class="d-flex flex-column vh-100">

    <!-- 상단 헤더 -->
    <div id="headPanel" class="navbar justify-content-between">
      <a href="/" class="navbar-brand ps-2">
        <img src="/image/spring_ai_logo_with_text.svg" width="200" />
      </a>
      <div id="spinner" class="spinner-border text-success d-none me-3" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <!-- 문서 업로드 / ETL 영역 -->
    <div id="documentPanel" class="bg-secondary-subtle border-bottom">
      <div class="p-2 fw-bold">1. RAG용 문서 업로드 및 ETL</div>

      <div class="input-group p-2 align-items-center">
        <span class="input-group-text">문서</span>
        <input id="attach" class="form-control" type="file" accept=".pdf" />
      </div>

      <div class="input-group p-2">
        <span class="input-group-text">출처(source)</span>
        <input id="source" class="form-control" type="text" value="" placeholder="예: constitution, proposal, manual" />
      </div>

      <div class="input-group p-2">
        <span class="input-group-text">임시 청크 크기</span>
        <input id="chunkSize" class="form-control" type="number" value="200" />
      </div>

      <div class="input-group p-2">
        <span class="input-group-text">최소 청크 크기</span>
        <input id="minChunkSizeChars" class="form-control" type="number" value="100" />
        <button type="button" class="btn btn-info" onclick="handleClear()">벡터 저장소 비우기</button>
        <button type="button" class="btn btn-success" onclick="handleETL()">ETL 실행</button>
      </div>
    </div>

    <!-- 대화 결과 출력 영역 -->
    <div id="chatPanel" class="flex-grow-1 container-fluid h-100 my-2" style="overflow-y:auto; overflow-x:hidden;">
    </div>

    <!-- Agent 질문 입력 영역 -->
    <div id="inputPanel" class="bg-secondary-subtle border-top">
      <div class="p-2 fw-bold">2. Agent 질문</div>

      <div class="input-group p-2">
        <span class="input-group-text">질문</span>
        <input id="question" type="text" class="form-control"
               placeholder="예: Spring AI가 뭐야? / 서울 날씨 알려줘 / 대한민국 헌법 제14조 설명해줘">
      </div>

      <div class="input-group p-2">
        <span class="input-group-text">유사도(0.0 ~ 1.0)</span>
        <input id="score" type="text" class="form-control" value="0.0">
      </div>

      <div class="input-group p-2">
        <span class="input-group-text">질문용 출처</span>
        <input id="questionSource" type="text" class="form-control"
               placeholder="비워두면 전체 검색, 입력하면 해당 source만 검색">
        <button type="button" class="btn btn-primary" onclick="handleAgentQuestion()">Agent 질문</button>
      </div>
    </div>

  </div>
</body>

</html>
